<!DOCTYPE html>
<html>

<head>
  <title>Website</title>
</head>

<body>
  <header>
    <h1>Welcome to Our Website</h1>
    <!-- Navigation links -->
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <!-- Hero section with image background -->
    <section class="hero">
      <div class="hero-content"></div>
      <img src="/hero-img.jpg"
        style="display: flex; justify-content: center; align-items: center; width: 100%; height: auto;"
        alt="Hero Image">
      <!-- Text over the hero image -->
      <div
        style="display: grid; justify-content: center; align-items: center; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
        <h1>This is my hero section</h1>
        <p>This is a brief description placeholder for the hero section. Task 3: Add a Hero Section, lab 1: Branching,
          Merging, and Handling Conflicts</p>
      </div>
    </section>

    <section class="contact form">
      <h2>Contact Us</h2>
      <form action="#" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy;2026 Website. All rights reserved.</p>
  </footer>
</body>

</html>
